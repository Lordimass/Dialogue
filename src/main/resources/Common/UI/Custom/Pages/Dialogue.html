<style>
    .dialogue-box {
        anchor-width: 1000;
        anchor-height: 250;
        anchor-bottom: 50;
        flex-weight: 1;
        padding: 17;
    }

    .title-box {
        anchor-height: 40;
        anchor-top: 8;
        background-image: url("Common/ContainerHeader.png") 20;
    }

    #title {
        align: center;
        font-size: 15;
        color: #b4c8c9;
        font-family: "Secondary";
        font-weight: bold;
        letter-spacing: 0;
        padding-top: 6px;
    }

    .content-box {
        background-image: url("Common/ContainerFullPatch.png") 20;
        anchor-height: 220;
        padding: 12;
        anchor-top: 40;
    }

    .choice-button {
        anchor-width: 900;
        anchor-height: 35;
    }

    #choice0 {anchor-top: 30}
    #choice1 {anchor-top: 70}
    #choice2 {anchor-top: 110}
    #choice3 {anchor-top: 150}

    #dialogue-content {
        anchor-bottom: 50;
        font-size: 25;
        padding-top: 20;
        color: #b4c8c9;
        font-family: "Primary";
        align: center;
    }

    .container-decoration-top {
        background-image: url("Common/ContainerDecorationTop.png");
        anchor-width: 236;
        anchor-height: 11;
        anchor-top: 2;
    }

    .container-decoration-bottom {
        background-image: url("Common/ContainerDecorationBottom.png");
        anchor-width: 236;
        anchor-height: 11;
        anchor-bottom: -15;
    }

    #next-button {
        anchor-width: 192;
        anchor-height: 35;
        anchor-bottom: 0;
        flex-weight: 1;
    }
</style>

<div class="dialogue-box">
    <div class="content-box">
        <p id="dialogue-content">{{$content}}<span></span></p>
        <button class="choice-button secondary-button" id="choice0" style="display: {{$choice0Display|none}}">{{$choice0}}</button>
        <button class="choice-button secondary-button" id="choice1" style="display: {{$choice1Display|none}}">{{$choice1}}</button>
        <button class="choice-button secondary-button" id="choice2" style="display: {{$choice2Display|none}}">{{$choice2}}</button>
        <button class="choice-button secondary-button" id="choice3" style="display: {{$choice3Display|none}}">{{$choice3}}</button>
    </div>
    <div class="title-box">
        <p id="title">{{$title}}</p>
    </div>
    <div class="container-decoration-top"></div>
    <div class="container-decoration-bottom"></div>
    <button id="next-button" style="display: {{$nextButtonDisplay|none}}">
        {{$nextButtonText|NEXT}}
    </button>
    <img
        id="portraitLeft"
        src="{{$portraitLeftSrc|none}}"
        style="
            anchor-width: 320;
            anchor-height: 320;
            anchor-left: -370;
            anchor-bottom: {{$portraitLeftBottomAnchor|-50}};
            display: {{$portraitLeftDisplay|none}}"
    />
    <img
        id="portraitRight"
        src="{{$portraitRightSrc|none}}"
        style="
            anchor-width: -320;
            anchor-height: 320;
            anchor-right: -50;
            anchor-bottom: {{$portraitRightBottomAnchor|-50}};
            display: {{$portraitRightDisplay|none}}"
    />
</div>
